<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SpendWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #E2DCB1 0%, #C4BC82 100%); 
        }
        .olive-btn { background-color: #4A4A22; }
        .olive-btn:hover { background-color: #363618; }
        .olive-text { color: #4A4A22; }
        .gold-bg { background-color: #CBB96A; }
        /* Custom wavy cut style matching your Figma */
        .wavy-card {
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            clip-path: ellipse(85% 100% at 50% 0%);
        }
    </style>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-10 left-6 text-3xl opacity-80">✨</div>
    <div class="absolute top-14 left-16 w-6 h-6 bg-[#FCFBF5]/40 rounded-lg rotate-12"></div>

    <div id="card-request" class="w-full max-w-sm bg-[#FCFBF5] rounded-t-[40px] rounded-b-[40px] shadow-2xl overflow-hidden transition-all duration-300">
        <div class="flex flex-col items-center pt-10 pb-6">
            <div class="w-20 h-20 bg-stone-100 rounded-full flex items-center justify-center border border-stone-200 mb-4 shadow-inner">
                <span class="text-3xl">🔄</span>
            </div>
            <h2 class="text-2xl font-bold olive-text tracking-wide uppercase px-4 text-center">Reset Your Password</h2>
        </div>

        <div class="bg-white p-8 pt-4 pb-12 shadow-inner rounded-t-[30px]">
            <form id="forgot-password-form" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Your Registered Email:</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-stone-400">✉️</span>
                        <input type="email" id="reset-email" required
                            class="w-full pl-11 pr-4 py-3.5 gold-bg text-stone-800 font-medium rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#4A4A22] placeholder-stone-600 shadow-inner" 
                            placeholder="enter your email address">
                    </div>
                </div>

                <button type="submit" id="btn-submit-reset"
                    class="w-full olive-btn text-white font-bold py-4 rounded-b-2xl rounded-t-[5px] uppercase tracking-wider transition-all shadow-md active:scale-[0.98]">
                    Send Reset Link
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="login.html" class="text-xs font-bold text-stone-400 hover:text-stone-600 transition uppercase tracking-wider">
                    ← Back to Login
                </a>
            </div>
        </div>
    </div>

    <div id="card-success" class="w-full max-w-sm bg-[#FCFBF5] rounded-t-[40px] rounded-b-[40px] shadow-2xl overflow-hidden hidden transition-all duration-300">
        <div class="flex flex-col items-center pt-14 pb-8">
            <h2 class="text-3xl font-extrabold olive-text tracking-wide uppercase text-center px-6 leading-tight">
                Password<br>Link Sent
            </h2>
        </div>

        <div class="bg-white p-8 pt-6 pb-12 shadow-inner rounded-t-[30px] flex flex-col items-center text-center">
            <div class="w-20 h-20 bg-stone-900 text-white rounded-full flex items-center justify-center text-3xl shadow-lg mb-6">
                ✓
            </div>

            <p class="text-stone-600 text-sm font-medium mb-8 max-w-[240px]">
                Check your email inbox. We have sent a link to reset your account password!
            </p>

            <a href="login.html"
                class="w-full olive-btn text-white font-bold py-4 rounded-b-2xl rounded-t-[5px] uppercase tracking-wider block text-center transition-all shadow-md active:scale-[0.98]">
                Login
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBifH2Tznj6CIYlGK9fmaU6KVj5-7OTdj4",
            authDomain: "expenses-tracker-18c98.firebaseapp.com",
            projectId: "expenses-tracker-18c98",
            storageBucket: "expenses-tracker-18c98.firebasestorage.app",
            messagingSenderId: "495267818258",
            appId: "1:495267818258:web:323bfa521330af6649a1cb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('forgot-password-form');
        const cardRequest = document.getElementById('card-request');
        const cardSuccess = document.getElementById('card-success');
        const btnSubmit = document.getElementById('btn-submit-reset');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('reset-email').value.trim();
            
            // UI Feedback during loading
            btnSubmit.innerText = "Sending...";
            btnSubmit.disabled = true;

            try {
                // Firebase logic to send reset email
                await sendPasswordResetEmail(auth, email);

                // Switch cards smoothly to match Figma screen 2
                cardRequest.classList.add('hidden');
                cardSuccess.classList.remove('hidden');

            } catch (error) {
                console.error("Reset Error:", error.code);
                btnSubmit.innerText = "Send Reset Link";
                btnSubmit.disabled = false;

                // Handle common errors cleanly
                if (error.code === 'auth/user-not-found') {
                    alert("System Error: This email address is not registered.");
                } else if (error.code === 'auth/invalid-email') {
                    alert("System Error: Please enter a valid email address.");
                } else {
                    alert("System Error: " + error.message);
                }
            }
        });
    </script>
</body>
</html>
