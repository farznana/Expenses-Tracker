<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Currency - Expenses Tracker</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <style>
        .setup-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .title-box {
            background: #7d6e33;
            color: white;
            padding: 12px;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .currency-btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            background: white;
            color: #333;
            border: 2px solid #bca95c;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .currency-btn:hover, .currency-btn.selected {
            background: #7d6e33;
            color: white;
            border-color: #7d6e33;
        }
        .other-country-select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: white;
            color: #333;
            border: 2px solid #bca95c;
            border-radius: 25px;
            font-weight: bold;
            outline: none;
            text-align-last: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .other-country-select:focus, .other-country-select.selected {
            background: #7d6e33;
            color: white;
            border-color: #7d6e33;
        }
        .btn-next {
            width: 100%;
            padding: 12px;
            background: #bca95c;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-next:hover {
            background: #7d6e33;
        }
        .divider {
            margin: 15px 0;
            font-size: 13px;
            color: #777;
            font-weight: bold;
        }
    </style>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
</head>
<body class="page">

    <div class="wave-divider-2"></div>

    <div class="setup-container">
        <div class="title-box">Choose Your Currency</div>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">
            Select your preferred currency for tracking expenses.
        </p>

        <button class="currency-btn" data-currency="MYR">MYR (Malaysian Ringgit)</button>
        <button class="currency-btn" data-currency="USD">USD (US Dollar)</button>
        <button class="currency-btn" data-currency="EUR">EUR (Euro)</button>

        <div class="divider">─ OR SEARCH OTHER WORLDWIDE ─</div>

        <select id="select-other-currency" class="other-country-select">
            <option value="" disabled selected>🌐 Select Other World Currency</option>
        </select>

        <button id="btn-next-currency" class="btn-next">Next</button>
    </div>

            "ZAR": "ZAR (South African Rand)",
            "ZMW": "ZMW (Zambian Kwacha)",
            "ZWL": "ZWL (Zimbabwean Dollar)"
        };

        // 2. Automatik isi select menu dropdown dengan data di atas
        const dropdown = document.getElementById('select-other-currency');
        for (const [code, fullName] of Object.entries(worldCurrencies)) {
            // Jangan masukkan MYR, USD, EUR dalam dropdown sebab dah ada butang kat atas
            if (code !== "MYR" && code !== "USD" && code !== "EUR") {
                const option = document.createElement('option');
                option.value = code;
                option.textContent = fullName;
                dropdown.appendChild(option);
            }
        }

        let selectedCurrency = "";
        const buttons = document.querySelectorAll('.currency-btn');
        
        // Listener untuk butang-butang kegemaran utama
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('selected'));
                dropdown.classList.remove('selected');
                dropdown.value = ""; 
                
                btn.classList.add('selected');
                selectedCurrency = btn.getAttribute('data-currency');
            });
        });

        // Listener jika guna dropdown semua negara
        dropdown.addEventListener('change', () => {
            buttons.forEach(b => b.classList.remove('selected'));
            dropdown.classList.add('selected');
            selectedCurrency = dropdown.value;
        });

        // Simpan data dan ke page set-budget.html
        document.getElementById('btn-next-currency').addEventListener('click', () => {
            if (!selectedCurrency) {
                alert("Please select a currency first!");
                return;
            }
            sessionStorage.setItem('user_currency', selectedCurrency);
            window.location.href = "set-budget.html";
        });
    </script>
</body>
</html>
