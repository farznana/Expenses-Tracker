<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Expenses Tracker</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <style>
        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #7d6e33;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bca95c;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #7d6e33;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #bca95c;
        }
        .forgot-link {
            text-align: left;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .forgot-link a {
            color: #7d6e33;
            text-decoration: none;
        }
        .google-divider {
            margin: 20px 0;
            color: #777;
            font-size: 14px;
        }
        .btn-google {
            width: 100%;
            padding: 10px;
            background: white;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .register-link {
            margin-top: 15px;
            font-size: 14px;
        }
        .register-link a {
            color: #7d6e33;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
</head>
<body class="page">

    <div class="wave-divider-2"></div>

    <div class="login-container">
        <h2 style="color: #7d6e33; margin-bottom: 5px;">Welcome Back!</h2>
        <p style="color: #666; margin-bottom: 25px;">LOGIN</p>

        <form id="login-form">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <input type="email" id="login-email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>
            </div>
            
            <div class="forgot-link">
                <a href="forgot-password.html">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit">LOGIN</button>
        </form>

        <div class="google-divider">OR</div>

        <button id="btn-google-login" class="btn-google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_\" logo\"_2023.png" alt="Google" style="width:18px; display:none;" onerror="this.src='https://www.gstatic.com/images/branding/product/1x/gsa_android_loupe_72dp.png'; this.style.width='18px';">
            <span>Sign in with Google</span>
        </button>

        <div class="register-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
