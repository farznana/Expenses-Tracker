<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Expenses Tracker</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <style>
        .register-container { background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #7d6e33; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #bca95c; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #7d6e33; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #bca95c; }
        .login-link { margin-top: 15px; font-size: 14px; }
        .login-link a { color: #7d6e33; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#D3CFA7]">

    <div class="register-container">
        <h2 style="color: #7d6e33; margin-bottom: 5px;">Create Account</h2>
        <form id="register-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required>
            </div>
            <button type="submit" class="btn-submit">REGISTER</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = { /* MASUKKAN CONFIG KAU SINI */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Auto-setup database user baru
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    monthlyBudget: 0,
                    initialBudget: 0,
                    createdAt: new Date().toISOString()
                });

                alert("Akaun berjaya dibuat!");
                window.location.href = "../dashboard/index.html";
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
