<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <script>
        // 1. Konfigurasi Tailwind & Load Tema
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="flex justify-center p-4 bg-[#D3CFA7] dark:bg-[#1A1A14] transition-colors duration-300">

    <div class="w-full max-w-sm bg-[#FCFBF5] dark:bg-[#20201A] min-h-[820px] rounded-[40px] shadow-2xl border-8 border-stone-800 dark:border-stone-700 p-6 space-y-6 transition-colors duration-300">
        
        <div class="pt-4 flex justify-between items-end">
            <div>
                <a href="../dashboard/index.html" class="text-[9px] font-black text-stone-400 dark:text-stone-500 uppercase tracking-widest hover:text-stone-800 dark:hover:text-white">← DASHBOARD</a>
                <h1 class="text-2xl font-black text-stone-800 dark:text-white uppercase tracking-tight mt-1">Activity Hub</h1>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-black text-stone-400 dark:text-stone-500 uppercase">Balance</p>
                <p id="balance-val" class="text-sm font-bold text-stone-800 dark:text-stone-200">Loading...</p>
            </div>
        </div>

        <div id="alert-container" class="space-y-4">
            <p class="text-xs text-stone-400 dark:text-stone-500">Syncing data...</p>
        </div>

        <p class="text-[10px] font-black text-stone-400 dark:text-stone-500 uppercase tracking-widest pt-4">Recent Transactions</p>
        <div id="tx-container" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBifH2Tznj6CIYLGK9fmaU6KVj5-7OTdj4", 
            authDomain: "expenses-tracker-18c98.firebaseapp.com", 
            projectId: "expenses-tracker-18c98", 
            storageBucket: "expenses-tracker-18c98.firebasestorage.app", 
            messagingSenderId: "495267818258", 
            appId: "1:495267818258:web:323bfa521330af6649a1cb" 
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        // Listener 1: Budget & Balance
        onSnapshot(doc(db, "users", "nana_test_user"), (docSnap) => {
            if (!docSnap.exists()) return;
            const data = docSnap.data();
            const balance = parseFloat(data.monthlyBudget) || 0;
            const initial = parseFloat(data.initialBudget) || 0;
            
            document.getElementById('balance-val').innerText = `RM ${balance.toFixed(2)}`;
            
            const spent = initial - balance;
            const pct = initial > 0 ? (spent / initial) * 100 : 0;
            
            const alertCont = document.getElementById('alert-container');
            alertCont.innerHTML = '';
            
            if (pct >= 80) {
                renderItem(alertCont, "Critical Budget", `Used ${pct.toFixed(0)}%! Stop spending.`, "bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400", "🚨");
            } else if (pct >= 50) {
                renderItem(alertCont, "Budget Warning", `Halfway gone. Keep it steady!`, "bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400", "⚠️");
            } else {
                renderItem(alertCont, "Good Job", "Your spending is under control. Nice!", "bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400", "✨");
            }
        });

        // Listener 2: Recent Transactions
        const q = query(collection(db, "expenses"), orderBy("date", "desc"), limit(5));
        onSnapshot(q, (snap) => {
            const txCont = document.getElementById('tx-container');
            txCont.innerHTML = '';
            snap.forEach((d) => {
                const tx = d.data();
                renderItem(txCont, tx.category || "General", `RM ${tx.amount || 0}`, "bg-white dark:bg-[#2C2C24] border border-stone-200 dark:border-stone-700 text-stone-800 dark:text-stone-200", "💸");
            });
        });

        function renderItem(container, title, msg, style, icon) {
            const div = document.createElement('div');
            // Extracting class from style string
            const colorClass = style.split(' ')[0] + ' ' + style.split(' ')[1];
            const textClass = style.split(' ')[2] + ' ' + style.split(' ')[3];
            
            div.className = `p-4 rounded-2xl flex gap-3 items-center shadow-sm border border-stone-100 dark:border-stone-700 bg-white dark:bg-[#2C2C24] transition-colors`;
            div.innerHTML = `
                <div class="w-10 h-10 ${colorClass} rounded-xl flex items-center justify-center font-black text-sm shrink-0">${icon}</div>
                <div>
                    <p class="font-bold text-xs text-stone-800 dark:text-white">${title}</p>
                    <p class="text-[10px] text-stone-500 dark:text-stone-400">${msg}</p>
                </div>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
