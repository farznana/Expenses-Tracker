<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-4 bg-[#D3CFA7] dark:bg-[#1A1A14]">

    <div class="w-full max-w-md bg-[#FAF9F5] dark:bg-[#20201A] h-[820px] rounded-[40px] shadow-2xl border-8 border-stone-800 flex flex-col overflow-hidden">
        
        <div class="flex justify-between items-center p-8 border-b border-stone-200 dark:border-stone-800">
            <a href="profile.html" class="text-sm font-bold text-stone-500 hover:text-stone-800 dark:hover:text-stone-200">Cancel</a>
            <h2 class="font-extrabold text-stone-800 dark:text-white uppercase">Edit Profile</h2>
            <button id="save-btn" class="text-sm font-bold text-[#4A4A22] dark:text-[#C4BC82]">Save</button>
        </div>

        <div class="p-8 space-y-5 overflow-y-auto">
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Full Name</label>
                <input type="text" id="name-input" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
            </div>
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Email Address</label>
                <input type="email" id="email-input" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
            </div>
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Phone Number</label>
                <input type="tel" id="phone-input" placeholder="+60 12-345 6789" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
            </div>
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Date of Birth</label>
                <input type="date" id="dob-input" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
            </div>
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">City / Location</label>
                <input type="text" id="location-input" placeholder="Kuala Lumpur" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
            </div>
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Occupation</label>
                <input type="text" id="job-input" placeholder="e.g. Designer" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
            </div>
            <div>
                <label class="block text-[10px] font-black text-stone-400 uppercase tracking-wider mb-1">Monthly Income Range</label>
                <select id="income-input" class="w-full bg-stone-100 dark:bg-[#2C2C24] p-4 rounded-2xl text-sm font-bold text-stone-800 dark:text-white border border-stone-200 dark:border-stone-700 outline-none focus:border-[#4A4A22]">
                    <option value="">Select Range</option>
                    <option value="<2k">Below RM 2,000</option>
                    <option value="2k-5k">RM 2,000 - RM 5,000</option>
                    <option value="5k-10k">RM 5,000 - RM 10,000</option>
                    <option value=">10k">Above RM 10,000</option>
                </select>
            </div>
        </div>
    </div>
    
    <script src="../js/theme.js"></script>
    <script src="../js/edit-profile.js"></script>
</body>
</html>
