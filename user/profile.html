<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-4 bg-[#D3CFA7] dark:bg-[#1A1A14] transition-colors duration-300">

    <div class="w-full max-w-md bg-[#FAF9F5] dark:bg-[#20201A] h-[820px] rounded-[40px] shadow-2xl border-8 border-stone-800 relative flex flex-col overflow-hidden transition-colors duration-300">
        
        <div class="p-6 text-center space-y-4 pt-10 flex-none">
            <a href="../dashboard/index.html" class="absolute top-8 left-8 text-stone-800 dark:text-stone-200 font-extrabold text-xl">⟨</a>
            
            <div class="relative inline-block mx-auto">
                <img id="profile-pic" src="https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&s=200" 
                     class="w-24 h-24 rounded-full object-cover border-4 border-[#4A4A22] shadow-md mx-auto">
            </div>
            
            <div>
                <h2 id="user-name" class="text-xl font-extrabold text-stone-800 dark:text-white uppercase">Loading...</h2>
                <p id="user-email" class="text-xs text-stone-500 dark:text-stone-400 font-medium">--</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-6 pb-6 space-y-3">
            <a href="../dashboard/analytics.html" class="w-full bg-[#4A4A22] text-white py-4 rounded-2xl font-bold text-center block mt-6 shadow-md transition-all">View Analytics 📈</a>
            
            <button id="logout-btn" class="w-full flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-red-200 dark:border-red-900 shadow-sm transition-colors text-left">
                <div class="flex items-center gap-3">
                    <span class="text-red-600">🚪</span>
                    <span class="text-sm font-bold text-red-600 dark:text-red-400">Logout</span>
                </div>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = { /* ... config kau ... */ };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../auth/login.html";
            } else {
                document.getElementById('user-name').innerText = user.displayName || "User";
                document.getElementById('user-email').innerText = user.email;

                // Generate MD5 hash untuk Gravatar
                const emailHash = CryptoJS.MD5(user.email.trim().toLowerCase()).toString();
                // d=identicon bagi gambar unik, s=200 tu saiz 200px
                document.getElementById('profile-pic').src = `https://www.gravatar.com/avatar/${emailHash}?d=identicon&s=200`;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "../auth/login.html");
        });
    </script>
</body>
</html>
