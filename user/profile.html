<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <script>
        tailwind.config = { darkMode: 'class' }
        // Inject tema awal untuk elak flickering
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-4 bg-[#D3CFA7] dark:bg-[#1A1A14] transition-colors duration-300">

    <div class="w-full max-w-md bg-[#FAF9F5] dark:bg-[#20201A] h-[820px] rounded-[40px] shadow-2xl border-8 border-stone-800 relative flex flex-col overflow-hidden transition-colors duration-300">
        
        <div class="p-6 text-center space-y-4 pt-10 flex-none">
            <a href="../dashboard/index.html" class="absolute top-8 left-8 text-stone-800 dark:text-stone-200 font-extrabold text-xl hover:scale-110 transition-all">⟨</a>
            <div class="relative inline-block mx-auto">
                <img id="profile-preview" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=256" 
                 class="w-24 h-24 rounded-full object-cover border-4 border-[#4A4A22] shadow-md mx-auto">
    
                <input type="file" id="profile-upload" class="hidden" accept="image/*">
    
                <label for="profile-upload" class="absolute bottom-0 right-0 bg-[#4A4A22] text-white p-1.5 rounded-full shadow-md text-xs w-7 h-7 flex items-center justify-center hover:scale-105 transition-all cursor-pointer">
                📷
                </label>
            </div>
            <div>
                <h2 class="text-xl font-extrabold tracking-tight text-stone-800 dark:text-white uppercase">NUR NATASHA FARZANA</h2>
                <p class="text-xs text-stone-500 dark:text-stone-400 font-medium mt-0.5">nana.test@gmail.com</p>
            </div>
            <a href="edit-profile.html" class="inline-block bg-[#4A4A22] text-white text-xs font-bold px-6 py-2.5 rounded-full shadow-md hover:scale-105 transition-all">EDIT PROFILE</a>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar px-6 pb-6 space-y-3">

            <a href="../dashboard/analytics.html" class="w-full bg-[#4A4A22] text-white py-4 rounded-2xl font-bold text-center block mt-6 shadow-md transition-all active:scale-[0.98]">
                View Detailed Analytics 📈
            </a>
            
            <div class="flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-stone-200/60 dark:border-stone-700/50 shadow-sm transition-colors">
                <div class="flex items-center gap-3">
                    <span class="text-lg">🌙</span>
                    <span class="text-sm font-bold text-stone-800 dark:text-stone-200">Dark Mode</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="dark-mode-checkbox" class="sr-only peer">
                    <div class="w-11 h-6 bg-stone-200 dark:bg-stone-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-stone-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#4A4A22]"></div>
                </label>
            </div>

            <a href="notifications.html" class="flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-stone-200/60 dark:border-stone-700/50 shadow-sm hover:bg-stone-50 dark:hover:bg-stone-700/30 transition">
                <div class="flex items-center gap-3"><span>🔔</span><span class="text-sm font-bold text-stone-800 dark:text-stone-200">Notifications</span></div>
                <span class="text-stone-400 font-bold text-sm">➔</span>
            </a>

            <a href="settings.html" class="flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-stone-200/60 dark:border-stone-700/50 shadow-sm hover:bg-stone-50 dark:hover:bg-stone-700/30 transition">
                <div class="flex items-center gap-3"><span>⚙️</span><span class="text-sm font-bold text-stone-800 dark:text-stone-200">Settings</span></div>
                <span class="text-stone-400 font-bold text-sm">➔</span>
            </a>

            <button id="export-data-btn" class="w-full flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-stone-200/60 dark:border-stone-700/50 shadow-sm hover:bg-stone-50 dark:hover:bg-stone-700/30 transition text-left">
                <div class="flex items-center gap-3"><span>📥</span><span class="text-sm font-bold text-stone-800 dark:text-stone-200">Export Financial Report</span></div>
                <span class="text-stone-400 font-bold text-sm">➔</span>
            </button>

            <button id="clear-cache-btn" class="w-full flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-stone-200/60 dark:border-stone-700/50 shadow-sm hover:bg-stone-50 dark:hover:bg-stone-700/30 transition text-left">
                <div class="flex items-center gap-3"><span>🗑️</span><span class="text-sm font-bold text-stone-800 dark:text-stone-200">Clear Cache</span></div>
                <span class="text-stone-400 font-bold text-sm">➔</span>
            </button>

            <a href="../auth/login.html" id="logout-btn" class="w-full flex justify-between items-center p-4 bg-white dark:bg-[#2C2C24] rounded-2xl border border-red-200 dark:border-red-900/50 shadow-sm hover:bg-red-50 dark:hover:bg-red-950/20 transition text-left">
                <div class="flex items-center gap-3">
                <span class="text-red-600">🚪</span>
                <span class="text-sm font-bold text-red-600 dark:text-red-400">Logout</span>
                </div>
                <span class="text-red-400 font-bold text-sm">➔</span>
            </a>
        </div>
    </div>

    <script src="../js/profile.js"></script>
</body>
</html>
