<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spending Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>.modal { display: none; } .modal.active { display: flex; }</style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
    </script>
</head>
<body class="bg-[#D3CFA7] dark:bg-[#1A1A14] p-4 transition-colors duration-300">
    <div id="analytics-content" class="w-full max-w-md mx-auto bg-[#FAF9F5] dark:bg-[#20201A] min-h-[850px] rounded-[40px] border-8 border-stone-800 dark:border-stone-700 p-6 shadow-2xl overflow-y-auto">
        <a href="../user/profile.html" class="text-sm font-bold text-stone-500 dark:text-stone-400">← Back to Profile</a>
        
        <div class="mt-6 bg-stone-200 dark:bg-stone-800 p-1 rounded-2xl flex items-center gap-1">
            <button id="btn-month" onclick="setActive('month')" class="flex-1 py-2 text-[10px] font-bold rounded-xl bg-white dark:bg-[#2C2C24] dark:text-white shadow-sm transition-all">Month</button>
            <button id="btn-all" onclick="setActive('all')" class="flex-1 py-2 text-[10px] font-bold text-stone-500 dark:text-stone-400 transition-all">All</button>
            <a href="transactions.html" class="flex-1 text-center py-2 bg-stone-500 text-white rounded-xl text-[10px] font-bold">History</a>
            <button onclick="toggleModal(true)" class="flex-1 py-2 bg-[#4A4A22] text-white rounded-xl text-[10px] font-bold">Budget</button>
        </div>

        <h1 class="text-2xl font-black text-stone-800 dark:text-white mt-6">Analytics</h1>
        <div class="mt-6 bg-[#4A4A22] p-6 rounded-[28px] text-white text-center shadow-lg">
            <p class="text-[10px] uppercase font-bold opacity-70">Total Spent</p>
            <h2 id="total-spent" class="text-4xl font-black">RM 0.00</h2>
        </div>

        <div class="mt-6 bg-white dark:bg-[#2C2C24] p-6 rounded-3xl border dark:border-stone-800 shadow-sm">
            <canvas id="bigChart"></canvas>
        </div>

        <div id="alerts" class="mt-4 space-y-2"></div>
    </div>

    <!-- Budget Modal -->
    <div id="budgetModal" class="modal fixed inset-0 bg-black bg-opacity-50 items-center justify-center p-4 z-50">
        <div class="bg-white dark:bg-[#20201A] rounded-3xl p-6 w-full max-w-sm">
            <h2 class="text-lg font-black mb-4 dark:text-white">Monthly Budget</h2>
            <div id="budgetInputs" class="space-y-3"></div>
            <button onclick="saveBudget()" class="w-full mt-4 bg-[#4A4A22] text-white py-2 rounded-xl font-bold">Save Changes</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBifH2Tznj6CIYLGK9fmaU6KVj5-7OTdj4", 
            authDomain: "expenses-tracker-18c98.firebaseapp.com", 
            projectId: "expenses-tracker-18c98", 
            storageBucket: "expenses-tracker-18c98.firebasestorage.app", 
            messagingSenderId: "495267818258", 
            appId: "1:495267818258:web:323bfa521330af6649a1cb" 
        };
        
        const db = getFirestore(initializeApp(firebaseConfig));
        const currentMonthKey = new Date().toISOString().slice(0, 7);
        let budgetData = JSON.parse(localStorage.getItem('myBudgets')) || { [currentMonthKey]: { "Food": 500, "Transport": 200, "Shopping": 300, "Others": 100 } };
        let doughnutChart;

        window.toggleModal = (show) => {
            const modal = document.getElementById('budgetModal');
            if(show) {
                const currentBudget = budgetData[currentMonthKey] || { "Food": 500, "Transport": 200, "Shopping": 300, "Others": 100 };
                document.getElementById('budgetInputs').innerHTML = Object.keys(currentBudget).map(cat => `
                    <div><label class="text-xs font-bold dark:text-stone-300">${cat}</label>
                    <input type="number" id="input-${cat}" value="${currentBudget[cat]}" class="w-full p-2 border rounded-lg dark:bg-stone-800 dark:border-stone-700 dark:text-white"></div>
                `).join('');
                modal.classList.add('active');
            } else modal.classList.remove('active');
        }

        window.saveBudget = () => {
            const newBudget = {};
            Object.keys(budgetData[currentMonthKey] || { "Food": 500, "Transport": 200, "Shopping": 300, "Others": 100 }).forEach(cat => {
                newBudget[cat] = document.getElementById(`input-${cat}`).value;
            });
            budgetData[currentMonthKey] = newBudget;
            localStorage.setItem('myBudgets', JSON.stringify(budgetData));
            toggleModal(false);
            loadData('month');
        }

        window.setActive = (mode) => {
            loadData(mode);
        }

        async function loadData(mode) {
            const snap = await getDocs(query(collection(db, "expenses"), where("userId", "==", "nana_test_user")));
            let total = 0, catTotals = {};
            const alertContainer = document.getElementById('alerts');
            alertContainer.innerHTML = "";

            snap.forEach(d => {
                const item = d.data();
                const amt = parseFloat(item.amount) || 0;
                const dateObj = item.date.toDate ? item.date.toDate() : new Date(item.date);
                const monthYear = dateObj.toISOString().slice(0, 7);

                if (mode === 'month' && monthYear !== currentMonthKey) return;

                total += amt;
                catTotals[item.category] = (catTotals[item.category] || 0) + amt;
            });

            // Budget Alert
            const currentBudget = budgetData[currentMonthKey] || {};
            Object.entries(catTotals).forEach(([cat, val]) => {
                if (val > (currentBudget[cat] || 0)) {
                    alertContainer.innerHTML += `<div class="bg-red-100 p-3 rounded-xl text-red-600 text-[10px] font-bold">⚠️ Over budget in ${cat}!</div>`;
                }
            });

            document.getElementById('total-spent').innerText = `RM ${total.toFixed(2)}`;
            if (doughnutChart) doughnutChart.destroy();
            doughnutChart = new Chart(document.getElementById('bigChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(catTotals), datasets: [{ data: Object.values(catTotals), backgroundColor: ['#4A4A22', '#8A9A5B', '#C4BC82', '#A3B18A'] }] }
            });
        }
        loadData('month');
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker OK!'))
                .catch(() => console.log('Service Worker Failed!'));
        }
    </script>
</body>
</html>
