<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center p-4 bg-[#D3CFA7] dark:bg-[#1A1A14] transition-colors duration-300">

    <div class="w-full max-w-md bg-[#FAF9F5] dark:bg-[#20201A] h-[850px] rounded-[40px] shadow-2xl border-8 border-stone-800 relative flex flex-col overflow-hidden">
        
        <div class="flex-1 overflow-y-auto no-scrollbar p-5 pb-24 space-y-5">
            <div class="bg-[#4A4A22] text-white p-5 rounded-[28px] flex justify-between items-center shadow-lg">
                <div class="flex items-center gap-3">
                    <a href="../user/profile.html">
                        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=256" alt="Profile" class="w-11 h-11 rounded-full object-cover border-2 border-[#C4BC82]">
                    </a>
                    <div>
                        <p id="time-greeting" class="text-[10px] text-stone-300 uppercase font-bold tracking-wider">Loading...</p>
                        <h2 class="text-lg font-extrabold tracking-tight">Nana</h2>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 overflow-x-auto no-scrollbar snap-x snap-mandatory px-1">
                <div class="min-w-[85%] bg-white dark:bg-[#2C2C24] p-5 rounded-3xl border shadow-sm snap-center space-y-2">
                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-wider">Remaining Budget</p>
                    <p id="remaining-budget-text" class="text-2xl font-black text-stone-800 dark:text-white">--</p>
                </div>
            </div>

            <a href="../dashboard/add-expense.html" class="block w-full bg-[#4A4A22] text-white text-center py-4 rounded-2xl font-bold text-sm shadow-md hover:bg-[#5B5B2E] transition-all">
                + ADD EXPENSE
            </a>

            <div id="transactions-container" class="space-y-2.5">
                <p class="text-xs text-stone-400 text-center py-4">Loading logs...</p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white dark:bg-[#2C2C24] p-4 flex justify-around items-center shadow-lg rounded-t-[24px]">
            <a href="index.html" class="flex flex-col items-center text-[#4A4A22]"><span class="text-xl">📊</span><span class="text-[9px] font-bold">Dashboard</span></a>
            <a href="add-expense.html" class="flex flex-col items-center text-stone-400"><span class="text-xl">💸</span><span class="text-[9px] font-bold">Add</span></a>
            <a href="../user/profile.html" class="flex flex-col items-center text-stone-400"><span class="text-xl">👤</span><span class="text-[9px] font-bold">Profile</span></a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = { /* ... config ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Auth Guard
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "../auth/login.html";
            } else {
                initDashboard(user.uid);
            }
        });

        function initDashboard(uid) {
            // Listen User Budget
            onSnapshot(doc(db, "users", uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('remaining-budget-text').innerText = `RM ${parseFloat(data.monthlyBudget).toFixed(2)}`;
                }
            });

            // Listen Transactions
            const q = query(collection(db, "expenses"), where("userId", "==", uid), orderBy("date", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('transactions-container');
                container.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const item = docSnap.data();
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
                            <div><p class="font-bold">${item.category}</p><p class="text-xs text-stone-400">${item.details}</p></div>
                            <span class="font-bold text-red-600">-RM ${item.amount}</span>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
