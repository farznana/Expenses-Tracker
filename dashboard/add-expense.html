<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A4A22">
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .olive-box { background-color: #4A4A22; }
    </style>
</head>
<body class="flex items-center justify-center p-6 bg-gradient-to-b from-[#E2DCB1] to-[#C4BC82] dark:from-none dark:bg-[#1A1A14] transition-colors duration-300">

    <div id="form-page" class="w-full max-w-sm bg-[#FCFBF5] dark:bg-[#20201A] rounded-[40px] shadow-2xl overflow-hidden border border-stone-100 dark:border-stone-800/40 transition-colors duration-300">
        <div class="olive-box text-white p-6 flex items-center justify-between">
            <a href="../dashboard/index.html" class="text-xs font-bold uppercase tracking-wider opacity-80 hover:opacity-100 transition">← Back</a>
            <h2 class="font-extrabold text-base tracking-tight">Add Expense</h2>
            <div class="w-10"></div>
        </div>
        <div class="p-6 space-y-4">
            <div class="bg-white dark:bg-[#2C2C24] border border-stone-200/60 dark:border-stone-700/50 p-5 rounded-3xl shadow-sm text-center transition-colors">
                <p class="text-[10px] text-stone-400 dark:text-stone-400 font-bold uppercase tracking-wider mb-1">Amount</p>
                <div id="display-amount" class="text-3xl font-black text-stone-800 dark:text-white">Loading...</div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-stone-400 dark:text-stone-400 uppercase tracking-wider mb-1.5">Details (Remark)</label>
                <input type="text" id="details-input" placeholder="e.g., Grab, McDonalds, Books" class="w-full bg-white dark:bg-[#2C2C24] py-3 px-4 rounded-xl border border-stone-200 dark:border-stone-700/60 text-sm font-medium text-stone-700 dark:text-stone-200 outline-none focus:border-[#4A4A22] dark:focus:border-[#C4BC82] transition-all">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-stone-400 dark:text-stone-400 uppercase tracking-wider mb-1.5">Category</label>
                <select id="category-select" class="w-full bg-white dark:bg-[#2C2C24] py-3 px-4 rounded-xl border border-stone-200 dark:border-stone-700/60 text-sm font-bold text-stone-700 dark:text-stone-200 outline-none focus:border-[#4A4A22] dark:focus:border-[#C4BC82] transition-all">
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Others">Others</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-2.5 pt-1">
                <button onclick="setQuickAmount(10)" class="expense-btn bg-white dark:bg-[#2C2C24] py-2.5 rounded-xl border border-stone-200 dark:border-stone-700/60 text-sm font-bold text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700 active:scale-[0.98] transition-all">10</button>
                <button onclick="setQuickAmount(50)" class="expense-btn bg-white dark:bg-[#2C2C24] py-2.5 rounded-xl border border-stone-200 dark:border-stone-700/60 text-sm font-bold text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700 active:scale-[0.98] transition-all">50</button>
                <button onclick="setQuickAmount(100)" class="expense-btn bg-white dark:bg-[#2C2C24] py-2.5 rounded-xl border border-stone-200 dark:border-stone-700/60 text-sm font-bold text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700 active:scale-[0.98] transition-all">100</button>
                <button onclick="setQuickAmount(500)" class="expense-btn bg-white dark:bg-[#2C2C24] py-2.5 rounded-xl border border-stone-200 dark:border-stone-700/60 text-sm font-bold text-stone-700 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700 active:scale-[0.98] transition-all">500</button>
            </div>
            <button onclick="openModal()" class="w-full bg-white dark:bg-[#2C2C24] py-3 rounded-xl border border-stone-200 dark:border-stone-700/60 font-bold text-xs text-stone-500 dark:text-stone-400 uppercase tracking-widest hover:bg-stone-50 dark:hover:bg-stone-700 transition-all">Other Amount</button>
            <button id="confirm-btn" class="w-full olive-box text-white py-4 rounded-2xl font-bold text-sm uppercase tracking-widest shadow-md hover:bg-[#5B5B2E] active:scale-[0.98] transition-all pt-2">Confirm Transfer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        let currentAmount = 0;
        let userCurrency = localStorage.getItem("userCurrency") || "MYR"; 

        const firebaseConfig = { /* ... config ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        function formatMoney(amount, currencyCode) {
            try { return new Intl.NumberFormat('en-US', { style: 'currency', currency: currencyCode }).format(amount); }
            catch (e) { return `${currencyCode} ${amount.toFixed(2)}`; }
        }

        async function loadUserCurrency() {
            const user = auth.currentUser;
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) { 
                    userCurrency = localStorage.getItem("userCurrency") || userDoc.data().currency || "MYR"; 
                }
            }
            document.getElementById('display-amount').innerText = formatMoney(currentAmount, userCurrency);
        }
        loadUserCurrency();

        document.getElementById('confirm-btn').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) { alert("Sila login semula."); window.location.href = "../auth/login.html"; return; }
            if (currentAmount <= 0) return alert("Please enter amount");
            
            const details = document.getElementById('details-input').value.trim() || "No description";
            const category = document.getElementById('category-select').value;
            const now = new Date();
            
            try {
                // Tambah data ke collection "expenses" milik user tersebut
                await addDoc(collection(db, "expenses"), { 
                    userId: user.uid, 
                    amount: currentAmount, 
                    details: details,
                    category: category,
                    date: now 
                });
                
                // Update budget user tersebut
                await updateDoc(doc(db, "users", user.uid), { monthlyBudget: increment(-currentAmount) });
                
                // Paparan Success
                document.getElementById('success-amount').innerText = formatMoney(currentAmount, userCurrency);
                document.getElementById('success-category').innerText = category;
                document.getElementById('success-remark').innerText = details;
                document.getElementById('success-datetime').innerText = now.toLocaleString();

                document.getElementById('form-page').classList.add('hidden');
                document.getElementById('success-page').classList.remove('hidden');
            } catch (error) { 
                console.error(error);
                alert("Something went wrong."); 
            }
        });

        // Window interaction mapping functions
        window.setQuickAmount = (val) => { currentAmount = val; document.getElementById('display-amount').innerText = formatMoney(currentAmount, userCurrency); };
        window.openModal = () => document.getElementById('amount-modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('amount-modal').classList.add('hidden');
        window.saveManualAmount = () => { 
            const inputVal = parseFloat(document.getElementById('manual-input').value);
            currentAmount = isNaN(inputVal) ? 0 : inputVal;
            document.getElementById('display-amount').innerText = formatMoney(currentAmount, userCurrency); 
            closeModal(); 
        };
    </script>
</body>
</html>
